<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE FIELD GUIDE — Visibility by Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0D0B1F;
  --mid-purple: #2D1F4E;
  --purple: #7B6FD4;
  --purple-bright: #8B7FE8;
  --cyan: #4ECFCF;
  --lavender: #C4BEFF;
  --white: #FFFFFF;
  --gold: #F0C060;
  --gold-dim: rgba(240,192,96,0.15);
  --text-dim: rgba(196,190,255,0.55);
  --card-bg: rgba(45,31,78,0.6);
  --card-border: rgba(123,111,212,0.3);
}

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── STARFIELD ── */
.starfield {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d, 4s) ease-in-out infinite var(--delay, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: var(--min-op, 0.1); transform: scale(1); }
  50% { opacity: var(--max-op, 0.7); transform: scale(1.3); }
}
.nebula {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(80px);
}
.nebula-1 {
  width: 600px; height: 400px;
  top: -100px; left: -100px;
  background: radial-gradient(ellipse, rgba(123,111,212,0.18) 0%, transparent 70%);
}
.nebula-2 {
  width: 500px; height: 500px;
  bottom: 0; right: -100px;
  background: radial-gradient(ellipse, rgba(78,207,207,0.12) 0%, transparent 70%);
}
.nebula-3 {
  width: 400px; height: 300px;
  top: 40%; left: 30%;
  background: radial-gradient(ellipse, rgba(139,127,232,0.1) 0%, transparent 70%);
}

/* ── LAYOUT ── */
.wrapper {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 40px 20px 24px;
  position: relative;
}
.eyebrow {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 12px;
  opacity: 0.85;
}
.main-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(2rem, 6vw, 3.8rem);
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--lavender) 0%, var(--purple-bright) 40%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ── DAY TABS ── */
.day-tabs {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0 0;
  padding: 0 8px;
}
.day-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px;
  border-radius: 40px;
  border: 1px solid rgba(123,111,212,0.25);
  background: rgba(45,31,78,0.4);
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.day-tab:hover {
  border-color: var(--purple);
  color: var(--lavender);
  background: rgba(123,111,212,0.15);
}
.day-tab.active {
  border-color: var(--cyan);
  background: rgba(78,207,207,0.12);
  color: var(--cyan);
  box-shadow: 0 0 16px rgba(78,207,207,0.2);
}
.day-tab-icon { font-size: 14px; }
.day-tab-info {}
.day-tab-num { font-size: 9px; opacity: 0.7; display: block; }
.day-tab-name { font-size: 10px; }

/* ── SECTION TITLE ── */
.section-header {
  text-align: center;
  margin: 28px 0 6px;
}
.section-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--lavender);
}
.section-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ── NODE SCROLL TRACK ── */
.nodes-track-wrapper {
  position: relative;
  margin: 16px -16px 0;
}
.nodes-track {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 16px 24px 20px;
  scroll-behavior: smooth;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.nodes-track::-webkit-scrollbar { display: none; }

/* ── NODE CARD ── */
.node {
  flex-shrink: 0;
  width: 112px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  transition: transform 0.2s ease;
  position: relative;
}
.node:hover { transform: translateY(-4px); }
.node:hover .node-orb { box-shadow: 0 0 32px var(--orb-color, var(--purple)), 0 0 64px rgba(123,111,212,0.3); }

.node-orb {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.15), transparent 60%),
              radial-gradient(circle, var(--orb-color, var(--purple)) 0%, rgba(13,11,31,0.9) 100%);
  border: 1px solid var(--orb-color, var(--purple));
  box-shadow: 0 0 16px var(--orb-color, var(--purple)), inset 0 0 20px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  transition: all 0.3s ease;
  position: relative;
  margin-bottom: 10px;
}
.node-orb::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--orb-color, var(--purple));
  opacity: 0.3;
  animation: orbit-pulse 3s ease-in-out infinite;
}
@keyframes orbit-pulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.08); opacity: 0.6; }
}

.node.active .node-orb {
  box-shadow: 0 0 40px var(--orb-color, var(--purple)), 0 0 80px rgba(123,111,212,0.4);
  border-width: 2px;
}
.node.active .node-orb::after {
  opacity: 0.7;
  inset: -6px;
}
.node-star {
  position: absolute;
  top: -4px; right: -4px;
  width: 18px; height: 18px;
  background: var(--gold);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  box-shadow: 0 0 8px var(--gold);
}
.node.active .node-star { display: flex; }

.node-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 10px;
  text-align: center;
  color: var(--lavender);
  line-height: 1.3;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 0 4px;
}
.node-energy {
  margin-top: 5px;
  display: flex;
  gap: 2px;
  align-items: center;
}
.energy-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--orb-color, var(--purple));
  opacity: 0.5;
}
.energy-dot.lit { opacity: 1; }

/* ── LESSON CARD ── */
.lesson-panel {
  margin-top: 20px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(12px);
  transition: all 0.35s ease;
}
.lesson-panel-inner {
  padding: 24px 24px 20px;
}
.lesson-breadcrumb {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.lesson-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.lesson-emoji-badge {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.lesson-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--white);
  line-height: 1.2;
}

/* Tabs */
.lesson-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 1px solid rgba(123,111,212,0.2);
  padding-bottom: 0;
}
.l-tab {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 8px 14px;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  color: var(--text-dim);
  border: 1px solid transparent;
  border-bottom: none;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.l-tab:hover { color: var(--lavender); }
.l-tab.active {
  color: var(--cyan);
  border-color: rgba(123,111,212,0.3);
  border-bottom-color: var(--card-bg);
  background: var(--card-bg);
}

.lesson-body { display: none; }
.lesson-body.visible { display: block; }

.lesson-text {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255,255,255,0.85);
  margin-bottom: 16px;
}

/* Gold nugget */
.gold-nugget {
  background: var(--gold-dim);
  border: 1px solid rgba(240,192,96,0.3);
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 12px;
}
.nugget-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.nugget-text {
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--gold);
  line-height: 1.5;
}

/* Belief shift */
.belief-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.belief-before, .belief-after {
  border-radius: 10px;
  padding: 14px 16px;
}
.belief-before {
  background: rgba(100,100,120,0.2);
  border: 1px solid rgba(150,150,180,0.2);
}
.belief-after {
  background: rgba(78,207,207,0.08);
  border: 1px solid rgba(78,207,207,0.3);
}
.belief-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.belief-before .belief-label { color: rgba(200,200,220,0.5); }
.belief-after .belief-label { color: var(--cyan); }
.belief-before .belief-text {
  font-size: 13px;
  color: rgba(200,200,220,0.5);
  text-decoration: line-through;
  line-height: 1.5;
}
.belief-after .belief-text {
  font-size: 14px;
  color: var(--cyan);
  font-weight: 400;
  line-height: 1.5;
}
.belief-arrow {
  text-align: center;
  font-size: 20px;
  color: var(--purple);
}

/* Nav */
.lesson-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid rgba(123,111,212,0.2);
}
.nav-counter {
  font-family: 'Montserrat', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 30px;
  border: 1px solid rgba(123,111,212,0.35);
  background: rgba(123,111,212,0.1);
  color: var(--lavender);
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.nav-btn:hover {
  background: rgba(123,111,212,0.25);
  border-color: var(--purple);
}
.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.nav-btn.next {
  background: rgba(78,207,207,0.1);
  border-color: rgba(78,207,207,0.35);
  color: var(--cyan);
}
.nav-btn.next:hover {
  background: rgba(78,207,207,0.2);
}

/* ── STAT BAR ── */
.stat-bar {
  display: flex;
  justify-content: center;
  gap: clamp(16px, 4vw, 48px);
  padding: 20px;
  margin-top: 28px;
  border-top: 1px solid rgba(123,111,212,0.2);
}
.stat-item {
  text-align: center;
}
.stat-icon { font-size: 18px; display: block; margin-bottom: 4px; }
.stat-num {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 22px;
  color: var(--white);
  display: block;
  line-height: 1;
}
.stat-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  display: block;
  margin-top: 3px;
}

/* scrollbar fade edges */
.nodes-track-wrapper::before,
.nodes-track-wrapper::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 40px;
  pointer-events: none;
  z-index: 3;
}
.nodes-track-wrapper::before {
  left: 0;
  background: linear-gradient(to right, var(--navy), transparent);
}
.nodes-track-wrapper::after {
  right: 0;
  background: linear-gradient(to left, var(--navy), transparent);
}

/* mobile tweaks */
@media (max-width: 600px) {
  .lesson-title { font-size: 15px; }
  .day-tab { padding: 6px 10px; }
  .day-tab-name { font-size: 9px; }
}
</style>
</head>

<!-- Stars -->
<div class="starfield" id="starfield"></div>

<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="wrapper">

  <div class="header">

</div>

// ── STATE ──────────────────────────────────────────────────────────────────────
let activeDay = parseInt(localStorage.getItem('ff_day') || '0');
let activeNode = parseInt(localStorage.getItem('ff_node') || '0');
let activeTab = 'lesson';

// ── STARS ─────────────────────────────────────────────────────────────────────
function buildStars() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${3+Math.random()*5}s; --delay:-${Math.random()*8}s;
      --min-op:${0.05+Math.random()*0.15}; --max-op:${0.4+Math.random()*0.6};
    `;
    sf.appendChild(s);
  }
}

// ── DAY TABS ──────────────────────────────────────────────────────────────────
function renderDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = DAYS.map((d, i) => `
    <div class="day-tab ${i === activeDay ? 'active' : ''}" onclick="selectDay(${i})">
      <span class="day-tab-icon">${d.emoji}</span>
      <span class="day-tab-info">
        <span class="day-tab-num">Day ${d.day}</span>
        <span class="day-tab-name">${d.node}</span>
      </span>
    </div>
  `).join('');
}

// ── SECTION HEADER ─────────────────────────────────────────────────────────────
function renderSectionHeader() {
  const d = DAYS[activeDay];
  document.getElementById('sectionTitle').textContent = `${d.emoji} ${d.node}`;
  document.getElementById('sectionSub').textContent = `Day ${d.day}: ${d.title} — ${d.lessons.length} lessons`;
}

// ── NODES ─────────────────────────────────────────────────────────────────────
const ORB_COLORS = ['#8B7FE8','#C4A0F0','#FF6B6B','#4ECFCF','#F0C060','#88E0A0'];

function renderNodes() {
  const d = DAYS[activeDay];
  const color = ORB_COLORS[activeDay];
  const track = document.getElementById('nodesTrack');
  track.innerHTML = d.lessons.map((l, i) => {
    const dots = Array(5).fill(0).map((_, di) => `<div class="energy-dot ${di < 3 ? 'lit' : ''}"></div>`).join('');
    return `
      <div class="node ${i === activeNode ? 'active' : ''}" style="--orb-color:${color}" onclick="selectNode(${i})">
        <div class="node-orb">
          ${l.emoji}
          <div class="node-star">★</div>
        </div>
        <div class="node-title">${l.title}</div>
        <div class="node-energy">${dots}</div>
      </div>
    `;
  }).join('');

  // scroll active node into view
  setTimeout(() => {
    const activeEl = track.querySelector('.node.active');
    if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, 100);
}

// ── LESSON PANEL ──────────────────────────────────────────────────────────────
function renderLesson() {
  const d = DAYS[activeDay];
  const l = d.lessons[activeNode];
  const total = d.lessons.length;
  const color = ORB_COLORS[activeDay];

  const inner = document.getElementById('lessonInner');
  inner.innerHTML = `
    <div class="lesson-breadcrumb">Day ${d.day} — ${d.node} · ${d.platform}</div>
    <div class="lesson-title-row">
      <div class="lesson-emoji-badge" style="border-color:${color}33; background: ${color}11">${l.emoji}</div>
      <div class="lesson-title">${l.title}</div>
    </div>

    <div class="lesson-tabs">
      <div class="l-tab ${activeTab === 'lesson' ? 'active' : ''}" onclick="switchTab('lesson')">📖 Lesson</div>
      <div class="l-tab ${activeTab === 'belief' ? 'active' : ''}" onclick="switchTab('belief')">🔄 Belief Shift</div>
    </div>

    <div class="lesson-body ${activeTab === 'lesson' ? 'visible' : ''}" id="tabLesson">
      <p class="lesson-text">${l.lesson}</p>
      <div class="gold-nugget">
        <div class="nugget-label">🌙 Gold Nugget</div>
        <div class="nugget-text">${l.nugget}</div>
      </div>
    </div>

    <div class="lesson-body ${activeTab === 'belief' ? 'visible' : ''}" id="tabBelief">
      <div class="belief-row">
        <div class="belief-before">
          <div class="belief-label">Before</div>
          <div class="belief-text">${l.before}</div>
        </div>
        <div class="belief-arrow">↓</div>
        <div class="belief-after">
          <div class="belief-label">After</div>
          <div class="belief-text">${l.after}</div>
        </div>
      </div>
    </div>

    <div class="lesson-nav">
      <button class="nav-btn" onclick="prevNode()" ${activeNode === 0 ? 'disabled' : ''}>← Prev</button>
      <span class="nav-counter">${activeNode + 1} of ${total}</span>
      <button class="nav-btn next" onclick="nextNode()" ${activeNode === total - 1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function selectDay(i) {
  activeDay = i;
  activeNode = 0;
  activeTab = 'lesson';
  localStorage.setItem('ff_day', i);
  localStorage.setItem('ff_node', 0);
  renderDayTabs();
  renderSectionHeader();
  renderNodes();
  renderLesson();
}

function selectNode(i) {
  activeNode = i;
  activeTab = 'lesson';
  localStorage.setItem('ff_node', i);
  renderNodes();
  renderLesson();
  // scroll panel into view on mobile
  document.getElementById('lessonPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function switchTab(tab) {
  activeTab = tab;
  renderLesson();
}

function nextNode() {
  const max = DAYS[activeDay].lessons.length - 1;
  if (activeNode < max) selectNode(activeNode + 1);
}

function prevNode() {
  if (activeNode > 0) selectNode(activeNode - 1);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildStars();
renderDayTabs();
renderSectionHeader();
renderNodes();
renderLesson();
</script>
